<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pax Front - World Conquest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU DE PARAMÉTRAGE DES PARTIES -->
    <div id="setupMenu" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex justify-center items-center backdrop-blur-md">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-600 w-96">
            <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center uppercase">Nouvelle Campagne</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Difficulté & Intelligence IA</label>
                    <select id="diffSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">Milice (Facile - IA Aléatoire)</option>
                        <option value="2" selected>Stratège (Normal - IA Calculatrice)</option>
                        <option value="3">Empereur (Difficile - IA Agressive anti-joueur)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Nombre de Factions Ennemies</label>
                    <select id="enemyCountSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">1 (Duel transcontinental)</option>
                        <option value="2">2 (Guerre tripartite)</option>
                        <option value="3" selected>3 (Guerre Mondiale Totale)</option>
                    </select>
                </div>

                <div class="text-xs text-gray-500 italic mt-2">
                    * Les couleurs ennemies (Rouge, Vert, Jaune) sont assignées historiquement selon les continents.
                </div>
            </div>

            <button id="startGameBtn" class="mt-8 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-lg text-lg uppercase tracking-wider">
                Lancer l'Invasion
            </button>
        </div>
    </div>

    <!-- Interface en jeu -->
    <button id="openMenuBtn" class="hidden absolute top-4 left-4 z-40 bg-gray-800 hover:bg-gray-700 text-white font-bold p-3 rounded-lg shadow-lg border border-gray-600 transition">
        📜 Afficher l'Empire
    </button>

    <div id="uiPanel" class="z-30 bg-gray-900 bg-opacity-95 text-white rounded-lg shadow-2xl pointer-events-auto w-80 flex flex-col border border-gray-600 hidden-panel">
        <div id="uiHeader" class="bg-gray-800 p-3 rounded-t-lg cursor-move flex justify-between items-center border-b border-gray-600">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">
                <span class="text-lg">≡</span> Commandement
            </span>
            <button id="closeMenuBtn" class="text-gray-400 hover:text-white hover:bg-red-600 font-bold w-8 h-8 rounded transition">✕</button>
        </div>

        <div class="p-4 overflow-y-auto max-h-[85vh]">
            <h1 class="text-2xl font-bold text-blue-400 mb-1">Pax Front</h1>
            
            <!-- Statistiques de l'Armée -->
            <div class="bg-blue-900 bg-opacity-40 p-3 rounded border border-blue-700 mt-2 mb-3">
                <h2 class="text-xs font-bold text-blue-300 uppercase mb-1">Effectifs Militaires (Fluctuations)</h2>
                <div class="text-2xl font-bold text-white" id="armyTotalDisplay">0</div>
                <div class="text-xs text-gray-400 mt-1">Recrutement continu. Pertes lors des combats.</div>
            </div>

            <!-- Économie -->
            <div class="bg-yellow-900 bg-opacity-40 p-3 rounded border border-yellow-700 mb-4">
                <h2 class="text-sm font-bold text-yellow-500 mb-1">Trésor Impérial</h2>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-bold" id="goldDisplay">0 💰</span>
                    <span class="text-xs text-yellow-300" id="goldIncomeDisplay">+0/sec</span>
                </div>
            </div>

            <!-- Technologies -->
            <h2 class="text-sm font-bold text-gray-400 mb-2 uppercase border-b border-gray-700 pb-1">Technologies</h2>
            <div class="space-y-2 mb-4">
                <button id="btnTechAttack" class="tech-btn w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-red-400">Armes Lourdes</span><span class="block text-xs text-gray-400">Attaque +20% (Niv <span id="lvlAttack">0</span>)</span></div>
                    <span class="text-yellow-400 font-bold text-sm" id="costAttack">50 💰</span>
                </button>
                <button id="btnTechDefense" class="tech-btn w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-green-400">Fortifications</span><span class="block text-xs text-gray-400">Défense +25% (Niv <span id="lvlDefense">0</span>)</span></div>
                    <span class="text-yellow-400 font-bold text-sm" id="costDefense">50 💰</span>
                </button>
                <button id="btnTechConscript" class="tech-btn w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-purple-400">Conscription</span><span class="block text-xs text-gray-400">Recrutement +1/s (Niv <span id="lvlConscript">0</span>)</span></div>
                    <span class="text-yellow-400 font-bold text-sm" id="costConscript">80 💰</span>
                </button>
                <button id="btnTechLogistics" class="tech-btn w-full bg-gray-800 hover:bg-gray-700 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-orange-400">Logistique</span><span class="block text-xs text-gray-400">Troupes Max +50 (Niv <span id="lvlLogistics">0</span>)</span></div>
                    <span class="text-yellow-400 font-bold text-sm" id="costLogistics">100 💰</span>
                </button>
            </div>
            
            <button id="capitulateBtn" class="mt-2 w-full bg-red-800 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition text-sm">
                Capituler (Retour au menu)
            </button>
        </div>
    </div>

    <!-- Modal Fin de Partie Corrigée -->
    <div id="endGameModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl text-center border-4" id="endGameBox">
            <h2 id="endGameTitle" class="text-4xl font-bold mb-4 uppercase text-white"></h2>
            <p id="endGameStats" class="text-gray-300 mb-6"></p>
            <button id="modalRestartBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg text-xl transition">
                Retour au menu principal
            </button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="mapData.js"></script>
    <script src="paxMechanics.js"></script>
    <script src="main.js"></script>
</body>
</html>
