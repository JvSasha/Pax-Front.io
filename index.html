<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pax Historia : Modern Warfare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; 
            background-color: #080c16; /* Océan profond */
            font-family: sans-serif;
        }
        canvas { 
            display: block; 
            /* Désactive le menu contextuel du clic droit pour l'utiliser comme déplacement de carte */
            touch-action: none; 
        }
        * { user-select: none; }

        /* Fenêtres déplaçables */
        .draggable-window {
            position: absolute;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s ease;
        }
        .hidden-ui {
            opacity: 0;
            pointer-events: none;
            display: none;
        }
        .drag-handle:active { background-color: #374151; }

        .tech-btn:hover:not(.disabled-tech) { background-color: #374151; cursor: pointer; }
        .disabled-tech { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }
        
        /* Personnalisation de la barre de défilement pour les menus */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- MENU DE DÉPART (MODALE) -->
    <div id="setupMenu" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex justify-center items-center backdrop-blur-md">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-600 w-96">
            <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center uppercase tracking-widest">Pax Historia</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Choisis ta Nation</label>
                    <select id="countrySelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500 font-bold">
                        <option value="F">🇫🇷 France</option>
                        <option value="G">🇩🇪 Allemagne</option>
                        <option value="R">🇷🇺 Russie</option>
                        <option value="C">🇨🇳 Chine</option>
                        <option value="U">🇺🇸 États-Unis</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Difficulté de l'IA</label>
                    <select id="diffSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">Milice (Facile)</option>
                        <option value="2" selected>Stratège (Normal)</option>
                        <option value="3">Empereur (Difficile)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Nombre d'Ennemis (IA)</label>
                    <select id="enemyCountSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">1 (Guerre Froide)</option>
                        <option value="2">2 (Conflit Tripartite)</option>
                        <option value="3" selected>3 (Guerre Mondiale)</option>
                        <option value="4">4 (Guerre Totale)</option>
                    </select>
                </div>
            </div>

            <button id="startGameBtn" class="mt-8 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-[0_0_15px_rgba(59,130,246,0.5)] text-lg uppercase">
                Déployer les troupes
            </button>
        </div>
    </div>

    <!-- PANNEAU DES RESSOURCES (Déplaçable) -->
    <div id="resourcePanel" class="draggable-window z-40 bg-gray-900 bg-opacity-90 text-white rounded-lg shadow-2xl pointer-events-auto w-64 border border-gray-600 hidden-ui" style="top: 20px; left: 20px;">
        <div class="drag-handle bg-gray-800 p-2 rounded-t-lg cursor-move flex justify-between items-center border-b border-gray-600">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">≡ Ressources</span>
        </div>
        <div class="p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                <span class="text-yellow-500 font-bold">Trésor National :</span>
                <span class="text-xl font-bold" id="goldDisplay">0 💰</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-blue-300 font-bold">Effectifs Totaux :</span>
                <span class="text-xl font-bold" id="armyTotalDisplay">0</span>
            </div>
        </div>
    </div>

    <!-- PANNEAU DE COMMANDEMENT (Déplaçable) -->
    <div id="cmdPanel" class="draggable-window z-30 bg-gray-900 bg-opacity-90 text-white rounded-lg shadow-2xl pointer-events-auto w-72 border border-gray-600 hidden-ui" style="top: 20px; right: 20px; left: auto;">
        <div class="drag-handle bg-gray-800 p-2 rounded-t-lg cursor-move flex justify-between items-center border-b border-gray-600">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">≡ Commandement</span>
        </div>
        <div class="p-4">
            <h2 class="text-sm font-bold text-gray-400 mb-2 uppercase border-b border-gray-700 pb-1">Technologies</h2>
            <div class="space-y-2 mb-4">
                <button id="btnTechAttack" class="tech-btn w-full bg-gray-800 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-red-400">Armes Modernes</span><span class="block text-xs text-gray-400">Attaque +20%</span></div>
                    <span class="text-yellow-400 font-bold text-sm">50 💰</span>
                </button>
                <button id="btnTechDefense" class="tech-btn w-full bg-gray-800 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-green-400">Défense Anti-Air</span><span class="block text-xs text-gray-400">Défense +25%</span></div>
                    <span class="text-yellow-400 font-bold text-sm">50 💰</span>
                </button>
            </div>
            <div class="text-xs text-gray-400 mb-4 p-2 bg-gray-800 rounded">
                <strong>Contrôles (Carte) :</strong><br>
                - 🖱️ Molette : Zoomer / Dézoomer<br>
                - 🖱️ Clic Droit (maintenu) : Déplacer<br>
                - 🖱️ Clic Gauche : Sélectionner / Attaquer
            </div>
            <button id="capitulateBtn" class="w-full bg-red-800 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition text-sm">
                Capituler (Retour au menu)
            </button>
        </div>
    </div>

    <!-- Modale de Fin -->
    <div id="endGameModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl text-center border-4" id="endGameBox">
            <h2 id="endGameTitle" class="text-4xl font-bold mb-4 uppercase text-white"></h2>
            <button id="modalRestartBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg text-xl transition">Nouveau Monde</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- MOTEUR DU JEU (Sécurisé pour le DOM Load) -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        /**
         * PAX HISTORIA : MODERN WARFARE
         * Architecture unifiée, sans API, robuste aux crashs de lancement.
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- 1. DONNÉES DE LA CARTE (80x30) ---
        // U: USA, F: France, G: Allemagne, R: Russie, C: Chine, X: Neutre, . : Océan
        const mapASCII = [
            "................................................................................",
            "....XXXXXXX.....................................XXXXXXXXXXXXXXXXXXXXXXXX........",
            "...XXXXXXXXXX..................................XXXXXXXXXXXXXXXXXXXXXXXXXXX......",
            "...XXXXXXXXXXXX...............................XXXXXXXXXXXXXXXXXXXXXXXXXXXXX.....",
            "....XXXXXXXXXXXXX............................XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....",
            "....XXXXXXXXXXXXXX...........................XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....",
            ".....UUUUUXXXXXXXXX........................XXXXRRRRRRRRRRRRRRRRRRRRRRRRXXXXX....",
            ".....UUUUUUUUUXXXXX........................XXXRRRRRRRRRRRRRRRRRRRRRRRRRXXXXX....",
            "......UUUUUUUUUUXXX........................XXRRRRRRRRRRRRRRRRRRRRRRRRRRXXXXX....",
            "......UUUUUUUUUUXX.........................XXGGRRRRRRRRRRRRRRRRRRRRRRRXXXXXX....",
            ".......UUUUUUUUXX.........................XXFFGGRRRRRRRRRRRRCCCCCXXXXX.XXXX.....",
            "........UUUUUUXX..........................XXFFGGRRXXXXXXXXXXCCCCCCCXXX..........",
            ".........XXXXXX............................XXXXXXXXXXXXXXXXXCCCCCCCCXX..........",
            "..........XXXX.............................XXXXXXXXXXXXXXXXXCCCCCCCCXX..........",
            "...........XX...............................XXXXXXXXXXXXXXXXXCCCCCCXXX..........",
            "............................................XXXXXXXXXXXXXXXXXCCCCCCXXX..........",
            ".............XXXX...........................XXXXXXXXXXXXXXXXXXCCCCXXXX..........",
            "............XXXXXXX..........................XXXXXXXXXXXXXXXXXXXXXXXX...........",
            "............XXXXXXXX.........................XXXXXXXXXXXXXXXXXXXXXX.............",
            ".............XXXXXXX..........................XXXXXXXXXXXXXXXXX.................",
            "..............XXXXX...........................XXXXXXXXXXXXXXXXX........XXXX.....",
            "..............XXXX.............................XXXXXXXXXXXXXXX.........XXXXX....",
            "...............XX...............................XXXXXXXXXXXXX..........XXXXXX...",
            ".................................................XXXXXXXXXX.............XXXX....",
            "..................................................XXXXXXX...............XXX.....",
            "....................................................XXX.........................",
            "................................................................................",
            "................................................................................",
            ".......XXXXXXXXXXXXXXXXXXXXXXXXX..................XXXXXXXXXXXXXXXXXXXXXXX.......",
            "........XXXXXXXXXXXXXXXXXXXXXXX....................XXXXXXXXXXXXXXXXXXXXX........"
        ];

        const COLS = 80;
        const ROWS = 30;
        const BASE_TILE_SIZE = 30; 

        // Factions (Couleurs Dynamiques)
        const FACTIONS = {
            0: { color: '#374151', name: 'Neutre' }, // Gris
            1: { color: '#3b82f6', name: 'Joueur' }, // Bleu
            2: { color: '#ef4444', name: 'IA 1' },   // Rouge
            3: { color: '#10b981', name: 'IA 2' },   // Vert
            4: { color: '#f59e0b', name: 'IA 3' },   // Jaune
            5: { color: '#8b5cf6', name: 'IA 4' }    // Violet
        };

        // --- 2. VARIABLES GLOBALES ---
        let grid = [];
        let selectedTile = null;
        let gameState = 'menu';
        let animationId;
        let lastTickTime = 0, lastAITick = 0;

        let camera = { x: 0, y: 0, zoom: 1 };
        let isPanning = false;
        let panStartX = 0, panStartY = 0;

        let playerGold = 0, playerIncome = 0;
        let techLevels = { attack: 0, defense: 0 };
        let techCosts = { attack: 50, defense: 50 };
        let gameSettings = { playerCountry: 'F', difficulty: 2, enemies: 3 };

        class Tile {
            constructor(c, r, countryCode) {
                this.c = c; this.r = r;
                this.countryCode = countryCode; 
                this.isLand = (countryCode !== '.');
                this.owner = 0; 
                this.troops = this.isLand ? Math.floor(Math.random() * 10) + 5 : 0;
                this.maxTroops = 250;
            }
        }

        // --- 3. DÉMARRAGE DU JEU ---
        function initGame() {
            if (animationId) cancelAnimationFrame(animationId);
            
            // Paramètres
            gameSettings.playerCountry = document.getElementById('countrySelect').value;
            gameSettings.difficulty = parseInt(document.getElementById('diffSelect').value);
            gameSettings.enemies = parseInt(document.getElementById('enemyCountSelect').value);

            grid = []; selectedTile = null;
            playerGold = 50; techLevels = { attack: 0, defense: 0 }; techCosts = { attack: 50, defense: 50 };
            updateTechUI();

            // Assigner les Pays
            let majorCountries = ['U', 'F', 'G', 'R', 'C'];
            let playerCode = gameSettings.playerCountry;
            majorCountries = majorCountries.filter(c => c !== playerCode); // On retire le pays du joueur
            
            let aiAssignments = {};
            for(let i = 1; i <= gameSettings.enemies; i++) {
                if(majorCountries.length > 0) {
                    let randIndex = Math.floor(Math.random() * majorCountries.length);
                    let aiCode = majorCountries.splice(randIndex, 1)[0];
                    aiAssignments[aiCode] = i + 1; // Commence à ID 2 (Rouge)
                }
            }

            // Génération sécurisée (Empêche le crash si la matrice ASCII est mal lue)
            for (let c = 0; c < COLS; c++) {
                grid[c] = [];
                for (let r = 0; r < ROWS; r++) {
                    let code = (mapASCII[r] && mapASCII[r][c]) ? mapASCII[r][c] : '.';
                    let tile = new Tile(c, r, code);
                    
                    if (code === playerCode) {
                        tile.owner = 1;
                        tile.troops = 30; // Boost joueur
                    } 
                    else if (aiAssignments[code]) {
                        tile.owner = aiAssignments[code];
                        tile.troops = 30; // Boost IA
                    }
                    grid[c][r] = tile;
                }
            }

            // Centrage de la caméra
            camera.zoom = Math.min(canvas.width / (COLS * BASE_TILE_SIZE * 0.8), 1.5);
            camera.x = (COLS * BASE_TILE_SIZE) / 2;
            camera.y = (ROWS * BASE_TILE_SIZE) / 2;

            gameState = 'playing';
            lastTickTime = performance.now();
            lastAITick = performance.now();
            gameLoop(performance.now());
        }

        // --- 4. GESTION DE LA CAMÉRA ---
        function worldToScreen(wx, wy) {
            return {
                x: (wx - camera.x) * camera.zoom + canvas.width / 2,
                y: (wy - camera.y) * camera.zoom + canvas.height / 2
            };
        }
        function screenToWorld(sx, sy) {
            return {
                x: (sx - canvas.width / 2) / camera.zoom + camera.x,
                y: (sy - canvas.height / 2) / camera.zoom + camera.y
            };
        }

        canvas.addEventListener('wheel', (e) => {
            if (gameState !== 'playing') return;
            e.preventDefault();
            camera.zoom *= (e.deltaY > 0 ? 0.9 : 1.1);
            camera.zoom = Math.max(0.3, Math.min(camera.zoom, 3.0));
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault()); 

        canvas.addEventListener('mousedown', (e) => {
            if (gameState !== 'playing') return;
            
            const worldPos = screenToWorld(e.clientX, e.clientY);
            const c = Math.floor(worldPos.x / BASE_TILE_SIZE);
            const r = Math.floor(worldPos.y / BASE_TILE_SIZE);

            if (e.button === 2 || (c < 0 || c >= COLS || r < 0 || r >= ROWS || !grid[c][r].isLand)) {
                isPanning = true;
                panStartX = e.clientX; panStartY = e.clientY;
                canvas.style.cursor = 'grabbing';
                return;
            }

            if (e.button === 0) {
                let clickedTile = grid[c][r];
                if (selectedTile) {
                    if (selectedTile === clickedTile) {
                        selectedTile = null; 
                    } else {
                        let isAdj = Math.abs(selectedTile.c - clickedTile.c) + Math.abs(selectedTile.r - clickedTile.r) === 1;
                        if (isAdj && selectedTile.owner === 1 && selectedTile.troops > 1) {
                            attack(selectedTile, clickedTile);
                        } else if (clickedTile.owner === 1) {
                            selectedTile = clickedTile;
                        } else {
                            selectedTile = null;
                        }
                    }
                } else if (clickedTile.owner === 1) {
                    selectedTile = clickedTile;
                }
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            camera.x -= (e.clientX - panStartX) / camera.zoom;
            camera.y -= (e.clientY - panStartY) / camera.zoom;
            panStartX = e.clientX; panStartY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isPanning = false;
            canvas.style.cursor = 'default';
        });

        // --- 5. LOGIQUE DU JEU (Économie, Combat, IA) ---
        function gameTick() {
            let terrCount = 0; let totalArmy = 0;

            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    let tile = grid[c][r];
                    if (tile.isLand && tile.owner !== 0) {
                        if(tile.troops < tile.maxTroops) {
                            tile.troops += (tile.owner === 1 ? 1 : (gameSettings.difficulty === 3 ? 2 : 1));
                        }
                        if (tile.owner === 1) {
                            terrCount++; totalArmy += Math.floor(tile.troops);
                        }
                    }
                }
            }
            
            playerIncome = terrCount * 2;
            playerGold += playerIncome;
            
            document.getElementById('goldDisplay').innerText = `${Math.floor(playerGold)} 💰`;
            document.getElementById('armyTotalDisplay').innerText = totalArmy.toLocaleString();
            updateTechUI();
        }

        function attack(source, target) {
            let sent = Math.floor(source.troops / 2);
            source.troops -= sent;

            if (target.owner === source.owner) {
                target.troops = Math.min(target.troops + sent, target.maxTroops);
            } else {
                let atkMod = (source.owner === 1) ? 1.0 + (techLevels.attack * 0.2) : 1.0;
                let defMod = (target.owner === 1) ? 1.2 + (techLevels.defense * 0.25) : 1.2;

                let pAtk = sent * atkMod;
                let pDef = target.troops * defMod;

                if (pAtk > pDef) {
                    target.owner = source.owner;
                    target.troops = (pAtk - pDef) / atkMod;
                } else {
                    target.troops -= (pAtk / defMod);
                }
            }
        }

        function processAI() {
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    let tile = grid[c][r];
                    if (tile.owner > 1 && tile.troops > 15) {
                        let chance = gameSettings.difficulty === 1 ? 0.2 : (gameSettings.difficulty === 2 ? 0.4 : 0.7);
                        if (Math.random() < chance) {
                            let neighbors = [];
                            if (c>0 && grid[c-1][r].isLand) neighbors.push(grid[c-1][r]);
                            if (c<COLS-1 && grid[c+1][r].isLand) neighbors.push(grid[c+1][r]);
                            if (r>0 && grid[c][r-1].isLand) neighbors.push(grid[c][r-1]);
                            if (r<ROWS-1 && grid[c][r+1].isLand) neighbors.push(grid[c][r+1]);
                            
                            let enemies = neighbors.filter(n => n.owner !== tile.owner);
                            if (enemies.length > 0) {
                                enemies.sort((a,b) => a.troops - b.troops);
                                attack(tile, enemies[0]);
                            }
                        }
                    }
                }
            }
        }

        // --- 6. TECHNOLOGIES ---
        function buyTech(type) {
            if (type === 'attack' && playerGold >= techCosts.attack) {
                playerGold -= techCosts.attack; techLevels.attack++; techCosts.attack *= 2;
            } else if (type === 'defense' && playerGold >= techCosts.defense) {
                playerGold -= techCosts.defense; techLevels.defense++; techCosts.defense *= 2;
            }
            updateTechUI();
        }
        function updateTechUI() {
            const btnAtk = document.getElementById('btnTechAttack');
            const btnDef = document.getElementById('btnTechDefense');
            if(btnAtk && btnDef) {
                btnAtk.children[1].innerText = `${techCosts.attack} 💰`;
                btnDef.children[1].innerText = `${techCosts.defense} 💰`;
                playerGold >= techCosts.attack ? btnAtk.classList.remove('disabled-tech') : btnAtk.classList.add('disabled-tech');
                playerGold >= techCosts.defense ? btnDef.classList.remove('disabled-tech') : btnDef.classList.add('disabled-tech');
            }
        }
        document.getElementById('btnTechAttack').addEventListener('click', () => buyTech('attack'));
        document.getElementById('btnTechDefense').addEventListener('click', () => buyTech('defense'));


        // --- 7. RENDU VISUEL ---
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    let tile = grid[c][r];
                    if (!tile || !tile.isLand) continue;

                    let worldX = c * BASE_TILE_SIZE;
                    let worldY = r * BASE_TILE_SIZE;
                    let screenPos = worldToScreen(worldX, worldY);
                    let size = BASE_TILE_SIZE * camera.zoom;

                    // Optimisation caméra : Ne pas dessiner ce qui est hors-champ
                    if (screenPos.x + size < 0 || screenPos.x > canvas.width || screenPos.y + size < 0 || screenPos.y > canvas.height) {
                        continue; 
                    }

                    ctx.fillStyle = FACTIONS[tile.owner].color;
                    ctx.fillRect(screenPos.x, screenPos.y, size - 1, size - 1);

                    if (selectedTile === tile) {
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2 * camera.zoom;
                        ctx.strokeRect(screenPos.x, screenPos.y, size - 1, size - 1);
                    }

                    if (size > 15 && tile.troops > 0) {
                        ctx.fillStyle = 'white';
                        ctx.font = `bold ${size * 0.4}px Arial`;
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.fillText(Math.floor(tile.troops), screenPos.x + size/2, screenPos.y + size/2);
                    }
                }
            }
        }

        // --- 8. BOUCLE MOTEUR ET ÉVÈNEMENTS GLOBAUX ---
        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;

            if (timestamp - lastTickTime > 1000) { gameTick(); lastTickTime = timestamp; }
            let aiSpeed = gameSettings.difficulty === 1 ? 1500 : (gameSettings.difficulty === 2 ? 800 : 400);
            if (timestamp - lastAITick > aiSpeed) { processAI(); lastAITick = timestamp; }

            drawMap();
            checkWinCondition();
            animationId = requestAnimationFrame(gameLoop);
        }

        function checkWinCondition() {
            let pCount = 0, eCount = 0;
            for(let c=0; c<COLS; c++) {
                for(let r=0; r<ROWS; r++) {
                    if(grid[c][r].isLand) {
                        if(grid[c][r].owner === 1) pCount++;
                        else if(grid[c][r].owner > 1) eCount++;
                    }
                }
            }
            if (pCount === 0 || (eCount === 0 && pCount > 0)) {
                gameState = 'ended';
                document.getElementById('endGameModal').classList.remove('hidden');
                document.getElementById('endGameTitle').innerText = pCount === 0 ? "NATION VAINCUE" : "HÉGÉMONIE MONDIALE";
            }
        }

        // Redimensionnement de la fenêtre
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        // 🚨 BOUTON START CORRIGÉ 🚨
        document.getElementById('startGameBtn').addEventListener('click', () => {
            document.getElementById('setupMenu').classList.add('hidden');
            document.querySelectorAll('.draggable-window').forEach(el => el.classList.remove('hidden-ui'));
            initGame();
        });

        // Retour au menu
        function returnToMenu() {
            gameState = 'menu';
            if(animationId) cancelAnimationFrame(animationId);
            document.getElementById('endGameModal').classList.add('hidden');
            document.querySelectorAll('.draggable-window').forEach(el => el.classList.add('hidden-ui'));
            document.getElementById('setupMenu').classList.remove('hidden');
            ctx.clearRect(0,0,canvas.width, canvas.height);
        }
        document.getElementById('capitulateBtn').addEventListener('click', returnToMenu);
        document.getElementById('modalRestartBtn').addEventListener('click', returnToMenu);

        // SYSTÈME DE FENÊTRES DÉPLAÇABLES (Souris & Tactile)
        document.querySelectorAll('.draggable-window').forEach(win => {
            let handle = win.querySelector('.drag-handle');
            if(!handle) return;
            
            let isDraggingWindow = false, offsetX = 0, offsetY = 0;
            
            const startDrag = (clientX, clientY) => {
                isDraggingWindow = true;
                let rect = win.getBoundingClientRect();
                offsetX = clientX - rect.left; offsetY = clientY - rect.top;
            };
            const onDrag = (clientX, clientY) => {
                if(!isDraggingWindow) return;
                win.style.left = `${clientX - offsetX}px`;
                win.style.top = `${clientY - offsetY}px`;
                win.style.right = 'auto'; // Écrase le css 'right' par défaut
            };

            // Écouteurs Souris
            handle.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
            window.addEventListener('mousemove', e => onDrag(e.clientX, e.clientY));
            window.addEventListener('mouseup', () => isDraggingWindow = false);
            
            // Écouteurs Tactiles pour mobile
            handle.addEventListener('touchstart', e => startDrag(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
            window.addEventListener('touchmove', e => onDrag(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
            window.addEventListener('touchend', () => isDraggingWindow = false);

            // Bloque le clic pour ne pas toucher la carte sous le menu
            win.addEventListener('mousedown', e => e.stopPropagation());
            win.addEventListener('wheel', e => e.stopPropagation());
            win.addEventListener('touchstart', e => e.stopPropagation(), {passive: true});
        });
    });
    </script>
</body>
</html>
