<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pax Historia : Modern Warfare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU DE DÉPART -->
    <div id="setupMenu" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex justify-center items-center backdrop-blur-md">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-600 w-96">
            <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center uppercase tracking-widest">Pax Historia</h1>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Choisis ta Nation</label>
                    <select id="countrySelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500 font-bold">
                        <option value="F">🇫🇷 France</option>
                        <option value="G">🇩🇪 Allemagne</option>
                        <option value="R">🇷🇺 Russie</option>
                        <option value="C">🇨🇳 Chine</option>
                        <option value="U">🇺🇸 États-Unis</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Difficulté de l'IA</label>
                    <select id="diffSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">Milice (Facile)</option>
                        <option value="2" selected>Stratège (Normal)</option>
                        <option value="3">Empereur (Difficile)</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-gray-400 text-sm font-bold mb-2">Nombre d'Ennemis (IA)</label>
                    <select id="enemyCountSelect" class="w-full bg-gray-700 text-white p-2 rounded outline-none border border-gray-600 focus:border-blue-500">
                        <option value="1">1 (Guerre Froide)</option>
                        <option value="2">2 (Conflit Tripartite)</option>
                        <option value="3" selected>3 (Guerre Mondiale)</option>
                        <option value="4">4 (Chaos Total)</option>
                    </select>
                </div>
            </div>

            <button id="startGameBtn" class="mt-8 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition shadow-[0_0_15px_rgba(59,130,246,0.5)] text-lg uppercase">
                Déployer les troupes
            </button>
        </div>
    </div>

    <!-- PANNEAU DES RESSOURCES (Déplaçable) -->
    <div id="resourcePanel" class="draggable-window z-40 bg-gray-900 bg-opacity-90 text-white rounded-lg shadow-2xl pointer-events-auto w-64 border border-gray-600 hidden-ui" style="top: 20px; left: 20px;">
        <div class="drag-handle bg-gray-800 p-2 rounded-t-lg cursor-move flex justify-between items-center border-b border-gray-600">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">≡ Ressources</span>
        </div>
        <div class="p-4 space-y-3">
            <div class="flex justify-between items-center border-b border-gray-700 pb-2">
                <span class="text-yellow-500 font-bold">Trésor National :</span>
                <span class="text-xl font-bold" id="goldDisplay">0 💰</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-blue-300 font-bold">Effectifs Totaux :</span>
                <span class="text-xl font-bold" id="armyTotalDisplay">0</span>
            </div>
        </div>
    </div>

    <!-- PANNEAU DE COMMANDEMENT (Déplaçable) -->
    <div id="cmdPanel" class="draggable-window z-30 bg-gray-900 bg-opacity-90 text-white rounded-lg shadow-2xl pointer-events-auto w-72 border border-gray-600 hidden-ui" style="top: 20px; right: 20px; left: auto;">
        <div class="drag-handle bg-gray-800 p-2 rounded-t-lg cursor-move flex justify-between items-center border-b border-gray-600">
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest flex items-center gap-2">≡ Commandement</span>
        </div>
        <div class="p-4">
            <h2 class="text-sm font-bold text-gray-400 mb-2 uppercase border-b border-gray-700 pb-1">Technologies</h2>
            <div class="space-y-2 mb-4">
                <button id="btnTechAttack" class="tech-btn w-full bg-gray-800 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-red-400">Armes Modernes</span><span class="block text-xs text-gray-400">Attaque +20%</span></div>
                    <span class="text-yellow-400 font-bold text-sm">50 💰</span>
                </button>
                <button id="btnTechDefense" class="tech-btn w-full bg-gray-800 border border-gray-600 text-left p-2 rounded transition flex justify-between items-center">
                    <div><span class="block text-sm font-bold text-green-400">Défense Anti-Air</span><span class="block text-xs text-gray-400">Défense +25%</span></div>
                    <span class="text-yellow-400 font-bold text-sm">50 💰</span>
                </button>
            </div>
            <div class="text-xs text-gray-400 mb-4 p-2 bg-gray-800 rounded">
                <strong>Contrôles :</strong><br>
                - 🖱️ Molette : Zoomer<br>
                - 🖱️ Clic Droit (maintenu) : Déplacer la carte<br>
                - 🖱️ Clic Gauche : Sélectionner / Attaquer
            </div>
            <button id="capitulateBtn" class="w-full bg-red-800 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition text-sm">
                Capituler (Retour au menu)
            </button>
        </div>
    </div>

    <!-- Modale de Fin -->
    <div id="endGameModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50">
        <div class="bg-gray-800 p-8 rounded-xl shadow-2xl text-center border-4" id="endGameBox">
            <h2 id="endGameTitle" class="text-4xl font-bold mb-4 uppercase text-white"></h2>
            <button id="modalRestartBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg text-xl transition">Nouveau Monde</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
</body>
</html>
